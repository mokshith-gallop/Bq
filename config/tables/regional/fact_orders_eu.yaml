# Manifest: regional.fact_orders_eu
# Multi-col partition with generated column
# CRITICAL tier

source:
  database: regional
  table: fact_orders_eu
  cluster: acme-edge
  format: parquet
  gcs_path: gs://acme-migration-staging-eu/regional/fact_orders_eu/
  partition_cols:
  - order_year
  - order_month
  - country_partition
target:
  project: acme-analytics-eu
  dataset: regional_eu
  table: fact_orders_eu
transforms:
  partition_key_conversion:
    source_cols:
    - order_year
    - order_month
    target_col: partition_month
    parse_fn: DATE
    generated_column: true
  map_to_json: []
  type_widening:
  - col: quantity
    from: INT
    to: INT64
wave: eu
validation:
  watermark_col: null
  null_check_cols:
  - order_id
  - customer_id
