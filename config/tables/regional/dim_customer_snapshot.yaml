# Manifest: regional.dim_customer_snapshot
# Source: Hive Parquet managed table on acme-edge cluster (Sqoop landing)
# Non-partitioned dimension table
source:
  database: regional
  table: dim_customer_snapshot
  cluster: acme-edge
  format: parquet
  gcs_path: gs://acme-migration-staging-eu/regional/dim_customer_snapshot/

target:
  project: acme-analytics-eu
  dataset: regional_eu
  table: dim_customer_snapshot

transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
    - { col: customer_sk, from: BIGINT, to: INT64 }

wave: eu

validation:
  watermark_col: null
  null_check_cols: [customer_sk, customer_id]
