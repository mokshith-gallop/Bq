  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/fact_email_engagement/
  partition_cols:
  - event_date
target:
  project: acme-analytics
  dataset: retail
  table: fact_email_engagement
transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
  - col: campaign_sk
    from: BIGINT
    to: INT64
  - col: user_sk
    from: BIGINT
    to: INT64
wave: wave_2_medium
validation:
  watermark_col: event_date
  null_check_cols:
  - send_id
  - campaign_sk
