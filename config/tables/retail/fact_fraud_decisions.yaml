# Manifest: retail.fact_fraud_decisions
source:
  database: retail
  table: fact_fraud_decisions
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/fact_fraud_decisions/
  partition_cols: [decision_date]

target:
  project: acme-analytics
  dataset: retail
  table: fact_fraud_decisions

transforms:
  partition_key_conversion: null  # decision_date is native DATE — no conversion
  map_to_json: []
  type_widening:
    - { col: txn_id, from: BIGINT, to: INT64 }
    - { col: customer_sk, from: BIGINT, to: INT64 }

validation:
  watermark_col: null
  null_check_cols: [txn_id, customer_sk]

wave: wave_2_medium
migration_tier: standard
