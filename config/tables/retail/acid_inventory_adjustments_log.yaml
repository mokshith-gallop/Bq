# Manifest: retail.acid_inventory_adjustments_log
# Source: Hive ACID/ORC table on acme-analytics cluster
# ACID: requires major compaction before DistCp
# Non-partitioned — CLUSTER BY adjustment_id in BQ
source:
  database: retail
  table: acid_inventory_adjustments_log
  cluster: acme-analytics
  format: orc_acid
  gcs_path: gs://acme-migration-staging-us/retail/acid_inventory_adjustments_log/
  acid_compaction: true

target:
  project: acme-analytics
  dataset: retail
  table: acid_inventory_adjustments_log

transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
    - { col: adjustment_id, from: BIGINT, to: INT64 }
    - { col: warehouse_sk, from: BIGINT, to: INT64 }
    - { col: quantity_delta, from: INT, to: INT64 }

wave: wave_3_large

validation:
  watermark_col: null
  null_check_cols: [adjustment_id, sku]
