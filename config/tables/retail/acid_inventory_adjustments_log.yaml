# Manifest: retail.acid_inventory_adjustments_log
# Hive ACID/ORC — audit-mandatory inventory adjustments

source:
  database: retail
  table: acid_inventory_adjustments_log
  cluster: acme-analytics
  format: orc
  gcs_path: gs://acme-migration-staging-us/retail/acid_inventory_adjustments_log/
  acid_compaction: true
target:
  project: acme-analytics
  dataset: retail
  table: acid_inventory_adjustments_log
transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
  - col: adjustment_id
    from: BIGINT
    to: INT64
  - col: warehouse_sk
    from: BIGINT
    to: INT64
  - col: quantity_delta
    from: INT
    to: INT64
wave: wave_3_large
validation:
  watermark_col: null
  null_check_cols:
  - adjustment_id
  - sku
