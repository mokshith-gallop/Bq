# Manifest: retail.fact_promo_redemptions

source:
  database: retail
  table: fact_promo_redemptions
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/fact_promo_redemptions/
  partition_cols:
  - redemption_date
target:
  project: acme-analytics
  dataset: retail
  table: fact_promo_redemptions
transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
  - col: redemption_id
    from: BIGINT
    to: INT64
  - col: promo_sk
    from: BIGINT
    to: INT64
  - col: customer_sk
    from: BIGINT
    to: INT64
wave: wave_2_medium
validation:
  watermark_col: redemption_date
  null_check_cols:
  - redemption_id
  - promo_sk
