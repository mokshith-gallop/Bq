# Manifest: retail.top_countries_daily
# Non-partitioned — TINYINT rank -> INT64

source:
  database: retail
  table: top_countries_daily
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/top_countries_daily/
target:
  project: acme-analytics
  dataset: retail
  table: top_countries_daily
transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
  - col: rank
    from: TINYINT
    to: INT64
  - col: orders
    from: BIGINT
    to: INT64
wave: wave_1_small
validation:
  watermark_col: null
  null_check_cols:
  - country
