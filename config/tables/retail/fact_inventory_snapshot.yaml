# Manifest: retail.fact_inventory_snapshot

source:
  database: retail
  table: fact_inventory_snapshot
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/fact_inventory_snapshot/
  partition_cols:
  - snapshot_date
target:
  project: acme-analytics
  dataset: retail
  table: fact_inventory_snapshot
transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
  - col: warehouse_sk
    from: BIGINT
    to: INT64
  - col: on_hand_units
    from: INT
    to: INT64
  - col: allocated_units
    from: INT
    to: INT64
  - col: in_transit_units
    from: INT
    to: INT64
  - col: available_units
    from: INT
    to: INT64
wave: wave_2_medium
validation:
  watermark_col: snapshot_date
  null_check_cols:
  - sku
  - warehouse_sk
