# Manifest: retail.fact_refunds
source:
  database: retail
  table: fact_refunds
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/fact_refunds/
  partition_cols: [refund_date]

target:
  project: acme-analytics
  dataset: retail
  table: fact_refunds

transforms:
  partition_key_conversion: null  # refund_date is native DATE — no conversion
  map_to_json: []
  type_widening:
    - { col: refund_id, from: BIGINT, to: INT64 }
    - { col: payment_id, from: BIGINT, to: INT64 }
    - { col: return_id, from: BIGINT, to: INT64 }
    - { col: customer_sk, from: BIGINT, to: INT64 }

validation:
  watermark_col: null
  null_check_cols: [refund_id, payment_id]

wave: wave_2_medium
migration_tier: standard
