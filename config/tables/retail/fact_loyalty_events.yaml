# Manifest: retail.fact_loyalty_events

source:
  database: retail
  table: fact_loyalty_events
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/fact_loyalty_events/
  partition_cols:
  - event_date
target:
  project: acme-analytics
  dataset: retail
  table: fact_loyalty_events
transforms:
  partition_key_conversion: null
  map_to_json:
  - source_col: meta
    target_col: meta
  type_widening:
  - col: event_id
    from: BIGINT
    to: INT64
  - col: points
    from: INT
    to: INT64
  - col: store_sk
    from: BIGINT
    to: INT64
wave: wave_2_medium
validation:
  watermark_col: event_date
  null_check_cols:
  - event_id
  - member_id
