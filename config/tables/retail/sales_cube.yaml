# Manifest: retail.sales_cube

source:
  database: retail
  table: sales_cube
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/sales_cube/
  partition_cols:
  - as_of_date
target:
  project: acme-analytics
  dataset: retail
  table: sales_cube
transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
  - col: dim_level
    from: TINYINT
    to: INT64
  - col: month_key
    from: SMALLINT
    to: INT64
  - col: product_sk
    from: BIGINT
    to: INT64
  - col: orders
    from: BIGINT
    to: INT64
  - col: units
    from: BIGINT
    to: INT64
wave: wave_1_small
validation:
  watermark_col: as_of_date
  null_check_cols: []
