# Manifest: retail.realtime_price_snapshot
# Source: retail.kudu_realtime_price (Kudu table, acme-analytics cluster)
# Kudu batch analytics snapshot — epoch ms BIGINT → TIMESTAMP conversion
# Non-partitioned in BQ
source:
  database: retail
  table: kudu_realtime_price
  cluster: acme-analytics
  format: kudu
  gcs_path: gs://acme-migration-staging-us/retail/kudu_realtime_price/
  partition_cols: []

target:
  project: acme-analytics
  dataset: retail
  table: realtime_price_snapshot

transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening: []
  kudu_epoch_conversion:
    - { col: updated_ts, from_unit: millis }

wave: wave_1_small

validation:
  watermark_col: null
  null_check_cols: [sku, store_id]
migration_tier: standard
