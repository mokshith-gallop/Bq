# Manifest: retail.acid_loyalty_points_ledger
# Source: Hive ACID/ORC table on acme-analytics cluster
# ACID: requires major compaction before DistCp
# Non-partitioned — CLUSTER BY member_id in BQ
source:
  database: retail
  table: acid_loyalty_points_ledger
  cluster: acme-analytics
  format: orc_acid
  gcs_path: gs://acme-migration-staging-us/retail/acid_loyalty_points_ledger/
  acid_compaction: true

target:
  project: acme-analytics
  dataset: retail
  table: acid_loyalty_points_ledger

transforms:
  partition_key_conversion: null
  map_to_json: []
  type_widening:
    - { col: entry_id, from: BIGINT, to: INT64 }
    - { col: points_delta, from: INT, to: INT64 }
    - { col: running_balance, from: INT, to: INT64 }

wave: wave_3_large

validation:
  watermark_col: null
  null_check_cols: [entry_id, member_id]
