# Manifest: retail.fact_app_clicks

source:
  database: retail
  table: fact_app_clicks
  cluster: acme-analytics
  format: parquet
  gcs_path: gs://acme-migration-staging-us/retail/fact_app_clicks/
  partition_cols:
  - event_date
  - platform_partition
target:
  project: acme-analytics
  dataset: retail
  table: fact_app_clicks
transforms:
  partition_key_conversion: null
  map_to_json:
  - source_col: properties
    target_col: properties
  type_widening:
  - col: user_sk
    from: BIGINT
    to: INT64
wave: wave_2_medium
validation:
  watermark_col: event_date
  null_check_cols:
  - session_id
  - user_sk
