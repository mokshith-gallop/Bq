source:
  database: staging
  table: parsed_loyalty_events
  cluster: acme-lake
  format: parquet
  gcs_path: gs://acme-migration-staging-us/staging/parsed_loyalty_events/
  partition_cols:
  - date_ts
target:
  project: acme-analytics
  dataset: staging
  table: parsed_loyalty_events
transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: '%Y%m%d'
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json:
  - source_col: meta
    target_col: meta
  type_widening:
  - col: points
    from: INT
    to: INT64
validation:
  watermark_col: date_ts
  null_check_cols:
  - member_id
  - tx_id
wave: wave_2_medium
migration_tier: standard
