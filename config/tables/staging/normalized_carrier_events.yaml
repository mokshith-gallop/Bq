source:
  database: staging
  table: normalized_carrier_events
  cluster: acme-lake
  format: parquet
  gcs_path: gs://acme-migration-staging-us/staging/normalized_carrier_events/
  partition_cols:
  - date_ts
target:
  project: acme-analytics
  dataset: staging
  table: normalized_carrier_events
transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: '%Y%m%d'
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json: []
  type_widening: []
validation:
  watermark_col: date_ts
  null_check_cols:
  - tracking_no
wave: wave_2_medium
migration_tier: standard
