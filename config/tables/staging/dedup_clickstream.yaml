# Manifest: staging.dedup_clickstream
# STRING partition date_ts + country_partition -> partition_date DATE

source:
  database: staging
  table: dedup_clickstream
  cluster: acme-lake
  format: parquet
  gcs_path: gs://acme-migration-staging-us/staging/dedup_clickstream/
  partition_cols:
  - date_ts
  - country_partition
target:
  project: acme-analytics
  dataset: staging
  table: dedup_clickstream
transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: '%Y%m%d'
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json: []
  type_widening: []
wave: wave_2_medium
validation:
  watermark_col: date_ts
  null_check_cols:
  - session_id
  - user_id
