source:
  database: raw
  table: loyalty_events
  cluster: acme-lake
  format: regex_serde
  gcs_path: gs://acme-migration-staging-us/raw/loyalty_events/
  partition_cols:
  - date_ts
  format_options:
    regex_pattern: ^([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|([^|]+)\|TX:([^;]+);META:(.*)$
    regex_columns:
    - event_ts_str
    - member_id
    - event_type
    - points
    - store_id
    - tx_id
    - meta_raw
target:
  project: acme-analytics
  dataset: raw
  table: loyalty_events
transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: '%Y%m%d'
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json: []
  type_widening: []
validation:
  watermark_col: date_ts
  null_check_cols:
  - member_id
  - tx_id
wave: wave_2_medium
migration_tier: standard
