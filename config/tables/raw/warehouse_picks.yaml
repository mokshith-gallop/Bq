source:
  database: raw
  table: warehouse_picks
  cluster: acme-lake
  format: parquet
  gcs_path: gs://acme-migration-staging-us/raw/warehouse_picks/
  partition_cols:
  - date_ts
  - warehouse_id_partition
target:
  project: acme-analytics
  dataset: raw
  table: warehouse_picks
transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: '%Y%m%d'
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json: []
  type_widening:
  - col: pick_id
    from: BIGINT
    to: INT64
  - col: quantity
    from: INT
    to: INT64
  - col: duration_ms
    from: INT
    to: INT64
validation:
  watermark_col: date_ts
  null_check_cols:
  - pick_id
  - sku
wave: wave_2_medium
migration_tier: standard
