source:
  database: raw
  table: email_campaign_clicks
  cluster: acme-lake
  format: json_serde
  gcs_path: gs://acme-migration-staging-us/raw/email_campaign_clicks/
  partition_cols:
  - date_ts
  format_options:
    ndjson: true
target:
  project: acme-analytics
  dataset: raw
  table: email_campaign_clicks
transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: '%Y%m%d'
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json:
  - source_col: utm
    target_col: utm
  type_widening: []
validation:
  watermark_col: date_ts
  null_check_cols:
  - campaign_id
  - send_id
wave: wave_2_medium
migration_tier: standard
