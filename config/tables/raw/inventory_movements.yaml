# Manifest: raw.inventory_movements
source:
  database: raw
  table: inventory_movements
  cluster: acme-lake
  format: parquet
  gcs_path: gs://acme-migration-staging-us/raw/inventory_movements/
  partition_cols: [year, month, day]

target:
  project: acme-analytics
  dataset: raw
  table: inventory_movements

transforms:
  partition_key_conversion:
    source_cols: [year, month, day]
    target_col: partition_date
    parse_fn: DATE
    generated_column: true  # BQ DDL: partition_date DATE AS (DATE(year, month, day))
  map_to_json: []
  type_widening:
    - { col: movement_id, from: BIGINT, to: INT64 }
    - { col: quantity, from: INT, to: INT64 }

validation:
  watermark_col: null
  null_check_cols: [movement_id, sku]

wave: wave_2_medium
migration_tier: standard
