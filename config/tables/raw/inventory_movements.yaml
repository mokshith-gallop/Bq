# Manifest: raw.inventory_movements
# Source: Hive Parquet external table on acme-lake
# Multi-column INT partition (year/month/day) -> generated column in BQ

source:
  database: raw
  table: inventory_movements
  cluster: acme-lake
  format: parquet
  gcs_path: gs://acme-migration-staging-us/raw/inventory_movements/
  partition_cols:
  - year
  - month
  - day
target:
  project: acme-analytics
  dataset: raw
  table: inventory_movements
transforms:
  partition_key_conversion:
    source_cols:
    - year
    - month
    - day
    target_col: partition_date
    parse_fn: DATE
    generated_column: true
  map_to_json: []
  type_widening:
  - col: movement_id
    from: BIGINT
    to: INT64
  - col: quantity
    from: INT
    to: INT64
wave: wave_2_medium
validation:
  watermark_col: null
  null_check_cols:
  - movement_id
  - sku
