# Manifest: raw.delivery_routes
source:
  database: raw
  table: delivery_routes
  cluster: acme-lake
  format: textfile_csv
  gcs_path: gs://acme-migration-staging-us/raw/delivery_routes/
  partition_cols: [date_ts]
  format_options:
    delimiter: ","
    header: true

target:
  project: acme-analytics
  dataset: raw
  table: delivery_routes

transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: "%Y%m%d"
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json: []
  type_widening:
    - { col: planned_stops, from: INT, to: INT64 }
    - { col: actual_stops, from: INT, to: INT64 }

validation:
  watermark_col: date_ts
  null_check_cols: [route_id, driver_id]

wave: wave_1_small
migration_tier: standard
