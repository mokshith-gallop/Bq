# Manifest: raw.driver_logs
source:
  database: raw
  table: driver_logs
  cluster: acme-lake
  format: json_serde
  gcs_path: gs://acme-migration-staging-us/raw/driver_logs/
  partition_cols: [date_ts]
  format_options:
    ndjson: true

target:
  project: acme-analytics
  dataset: raw
  table: driver_logs

transforms:
  partition_key_conversion:
    source_col: date_ts
    target_col: partition_date
    parse_format: "%Y%m%d"
    parse_fn: PARSE_DATE
    generated_column: false
  map_to_json:
    - { source_col: extras, target_col: extras }
  type_widening: []

validation:
  watermark_col: date_ts
  null_check_cols: [driver_id]

wave: wave_1_small
migration_tier: standard
