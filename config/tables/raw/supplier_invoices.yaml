# Manifest: raw.supplier_invoices
# Source: Hive SequenceFile external table on acme-lake
# Special handling: sc.sequenceFile() custom Hadoop InputFormat reader
# Multi-column INT partition (feed_year/feed_month) -> generated column in BQ

source:
  database: raw
  table: supplier_invoices
  cluster: acme-lake
  format: sequencefile
  gcs_path: gs://acme-migration-staging-us/raw/supplier_invoices/
  partition_cols:
  - feed_year
  - feed_month
  format_options:
    key_field: invoice_no
    value_format: serialized_row
target:
  project: acme-analytics
  dataset: raw
  table: supplier_invoices
transforms:
  partition_key_conversion:
    source_cols:
    - feed_year
    - feed_month
    target_col: partition_month
    parse_fn: DATE
    generated_column: true
  map_to_json: []
  type_widening: []
wave: wave_1_small
validation:
  watermark_col: null
  null_check_cols:
  - invoice_no
  - supplier_id
